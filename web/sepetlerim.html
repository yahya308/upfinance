<!doctype html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpFinance — Sepetlerim</title>
    <meta name="description" content="UpFinance sepet listeleme sayfası. Sepetlerinizi görüntüleyin ve yönetin." />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --gold-dark: #B8960C;
            --navy: #1B1F3B;
            --navy-deep: #0F1225;
            --navy-light: #252A4A;
            --navy-surface: #1E2340;
            --text-primary: #F5F5F5;
            --text-muted: #A0A4B8;
            --error: #FF6B6B;
            --success: #4ADE80;
            --border: rgba(212, 175, 55, 0.15);
            --glow: rgba(212, 175, 55, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0F1225 0%, #1B1F3B 40%, #151933 60%, #0F1225 100%);
            overflow: hidden;
        }

        .bg-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 175, 55, 0.04) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(30px, -20px) rotate(2deg);
            }
        }

        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            left: 15%;
            top: 20%;
            animation-delay: 0s;
            animation-duration: 10s;
        }

        .particle:nth-child(2) {
            left: 70%;
            top: 30%;
            animation-delay: 2s;
            animation-duration: 12s;
        }

        .particle:nth-child(3) {
            left: 40%;
            top: 70%;
            animation-delay: 4s;
            animation-duration: 9s;
        }

        .particle:nth-child(4) {
            left: 85%;
            top: 60%;
            animation-delay: 1s;
            animation-duration: 11s;
        }

        .particle:nth-child(5) {
            left: 25%;
            top: 85%;
            animation-delay: 3s;
            animation-duration: 8s;
        }

        .particle:nth-child(6) {
            left: 55%;
            top: 15%;
            animation-delay: 5s;
            animation-duration: 13s;
        }

        @keyframes float {

            0%,
            100% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }

            25% {
                opacity: 0.6;
            }

            50% {
                opacity: 0.3;
                transform: translateY(-60px) scale(1.5);
            }

            75% {
                opacity: 0.5;
            }
        }

        /* Page layout */
        .page {
            position: relative;
            z-index: 1;
            max-width: 720px;
            margin: 0 auto;
            padding: 24px;
            min-height: 100vh;
            min-height: 100dvh;
        }

        /* Header */
        .page-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 28px;
            flex-wrap: wrap;
            animation: fadeIn 0.6s ease forwards;
            opacity: 0;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .header-icon {
            width: 46px;
            height: 46px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 16px rgba(212, 175, 55, 0.3);
            flex-shrink: 0;
        }

        .header-icon svg {
            width: 22px;
            height: 22px;
            fill: var(--navy-deep);
        }

        .header-title {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .header-sub {
            font-size: 13px;
            color: var(--text-muted);
            margin-top: 2px;
        }

        .header-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--navy-deep);
            border: none;
            border-radius: 10px;
            padding: 10px 18px;
            font-size: 13px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .btn-new::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-new:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(212, 175, 55, 0.35);
        }

        .btn-new:hover::before {
            opacity: 1;
        }

        .btn-new span {
            position: relative;
            z-index: 1;
        }

        .btn-new svg {
            position: relative;
            z-index: 1;
            width: 16px;
            height: 16px;
            fill: var(--navy-deep);
        }

        /* Counter badge */
        .counter-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
            background: rgba(30, 35, 64, 0.6);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 12px;
        }

        .counter-badge .num {
            color: var(--gold);
            font-weight: 700;
        }

        /* Basket card */
        .basket-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .basket-card {
            background: rgba(30, 35, 64, 0.75);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 22px 24px 18px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.25),
                0 0 0 1px rgba(212, 175, 55, 0.04) inset;
            transition: all 0.3s ease;
            animation: cardSlideIn 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(12px);
        }

        @keyframes cardSlideIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .basket-card:hover {
            border-color: rgba(212, 175, 55, 0.25);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.3),
                0 0 0 1px rgba(212, 175, 55, 0.08) inset;
        }

        /* Card top row */
        .card-top {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 16px;
        }

        .card-name {
            font-size: 17px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .perf-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            font-size: 14px;
            font-weight: 700;
            padding: 4px 12px;
            border-radius: 8px;
            white-space: nowrap;
            flex-shrink: 0;
        }

        .perf-badge.positive {
            background: rgba(74, 222, 128, 0.12);
            color: var(--success);
        }

        .perf-badge.negative {
            background: rgba(255, 107, 107, 0.12);
            color: var(--error);
        }

        .perf-badge.neutral {
            background: rgba(160, 164, 184, 0.12);
            color: var(--text-muted);
        }

        .perf-badge .arrow {
            font-size: 11px;
        }

        /* Stats grid */
        .stats-row {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            margin-bottom: 16px;
        }

        .stat-box {
            background: rgba(15, 18, 37, 0.45);
            border: 1px solid rgba(212, 175, 55, 0.06);
            border-radius: 10px;
            padding: 10px 12px;
            text-align: center;
        }

        .stat-label {
            font-size: 10px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .stat-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-primary);
        }

        .stat-value.gold {
            color: var(--gold);
        }

        /* Reset date */
        .card-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .card-meta svg {
            width: 13px;
            height: 13px;
            flex-shrink: 0;
        }

        /* Action buttons */
        .card-actions {
            display: flex;
            gap: 8px;
            border-top: 1px solid rgba(212, 175, 55, 0.08);
            padding-top: 14px;
        }

        .btn-action {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 5px;
            padding: 9px 10px;
            border-radius: 9px;
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.25s ease;
        }

        .btn-action svg {
            width: 14px;
            height: 14px;
            flex-shrink: 0;
        }

        .btn-detail {
            background: rgba(212, 175, 55, 0.1);
            border-color: rgba(212, 175, 55, 0.15);
            color: var(--gold);
        }

        .btn-detail:hover {
            background: rgba(212, 175, 55, 0.18);
            border-color: rgba(212, 175, 55, 0.3);
        }

        .btn-reset {
            background: rgba(160, 164, 184, 0.08);
            border-color: rgba(160, 164, 184, 0.12);
            color: var(--text-muted);
        }

        .btn-reset:hover {
            background: rgba(160, 164, 184, 0.15);
            border-color: rgba(160, 164, 184, 0.25);
            color: var(--text-primary);
        }

        .btn-delete-action {
            background: rgba(255, 107, 107, 0.08);
            border-color: rgba(255, 107, 107, 0.12);
            color: var(--error);
        }

        .btn-delete-action:hover {
            background: rgba(255, 107, 107, 0.18);
            border-color: rgba(255, 107, 107, 0.3);
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            animation: fadeIn 0.8s ease forwards;
            opacity: 0;
        }

        .empty-icon {
            width: 80px;
            height: 80px;
            background: rgba(212, 175, 55, 0.06);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 24px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
        }

        .empty-icon svg {
            width: 36px;
            height: 36px;
            color: rgba(212, 175, 55, 0.3);
        }

        .empty-title {
            font-size: 18px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 8px;
        }

        .empty-desc {
            font-size: 14px;
            color: var(--text-muted);
            margin-bottom: 24px;
            line-height: 1.5;
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: rgba(30, 35, 64, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--error);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            max-width: min(360px, calc(100vw - 24px));
        }

        .toast.success {
            border-color: rgba(74, 222, 128, 0.3);
            color: var(--success);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* Nav link */
        .nav-bar {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid rgba(212, 175, 55, 0.06);
        }

        .nav-bar a {
            color: var(--gold);
            text-decoration: none;
            font-size: 13px;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-bar a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-bar a:hover::after {
            width: 100%;
        }

        .nav-bar a:hover {
            color: var(--gold-light);
        }

        /* Confirm dialog */
        .confirm-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.6);
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .confirm-overlay.active {
            display: flex;
        }

        .confirm-box {
            background: var(--navy-surface);
            border: 1px solid var(--border);
            border-radius: 18px;
            padding: 28px 24px 22px;
            max-width: 380px;
            width: 100%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.4);
            animation: cardSlideIn 0.3s ease;
        }

        .confirm-title {
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .confirm-desc {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .confirm-actions {
            display: flex;
            gap: 10px;
        }

        .confirm-actions button {
            flex: 1;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: 1px solid transparent;
            transition: all 0.2s ease;
        }

        .btn-cancel {
            background: rgba(160, 164, 184, 0.1);
            border-color: rgba(160, 164, 184, 0.15);
            color: var(--text-muted);
        }

        .btn-cancel:hover {
            background: rgba(160, 164, 184, 0.2);
        }

        .btn-confirm-danger {
            background: rgba(255, 107, 107, 0.15);
            border-color: rgba(255, 107, 107, 0.25);
            color: var(--error);
        }

        .btn-confirm-danger:hover {
            background: rgba(255, 107, 107, 0.25);
        }

        .btn-confirm-warn {
            background: rgba(212, 175, 55, 0.15);
            border-color: rgba(212, 175, 55, 0.25);
            color: var(--gold);
        }

        .btn-confirm-warn:hover {
            background: rgba(212, 175, 55, 0.25);
        }

        /* Reset mode modal */
        .reset-modal-body {
            text-align: left;
        }

        .reset-option {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            background: rgba(15, 18, 37, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.1);
            border-radius: 10px;
            padding: 12px 14px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .reset-option:hover {
            border-color: rgba(212, 175, 55, 0.25);
            background: rgba(15, 18, 37, 0.7);
        }

        .reset-option.selected {
            border-color: var(--gold);
            background: rgba(212, 175, 55, 0.06);
        }

        .reset-option input[type="radio"] {
            accent-color: var(--gold);
            margin-top: 2px;
            flex-shrink: 0;
        }

        .reset-option-text {
            flex: 1;
        }

        .reset-option-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 2px;
        }

        .reset-option-desc {
            font-size: 11px;
            color: var(--text-muted);
            line-height: 1.4;
        }

        .reset-warning {
            background: rgba(255, 107, 107, 0.08);
            border: 1px solid rgba(255, 107, 107, 0.15);
            border-radius: 10px;
            padding: 12px 14px;
            color: var(--error);
            font-size: 13px;
            line-height: 1.5;
            text-align: center;
        }

        /* ═══ Responsive ═══ */

        @media (max-width: 600px) {
            .page {
                padding: 16px;
            }

            .header-title {
                font-size: 19px;
            }

            .header-icon {
                width: 40px;
                height: 40px;
                border-radius: 12px;
            }

            .header-icon svg {
                width: 20px;
                height: 20px;
            }

            .page-header {
                margin-bottom: 20px;
            }

            .basket-card {
                padding: 18px 18px 14px;
                border-radius: 16px;
            }

            .card-name {
                font-size: 15px;
                max-width: 200px;
            }

            .stats-row {
                gap: 8px;
            }

            .stat-box {
                padding: 8px 8px;
            }

            .stat-label {
                font-size: 9px;
            }

            .stat-value {
                font-size: 13px;
            }

            .btn-action {
                padding: 8px 8px;
                font-size: 11px;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 12px;
            }

            .page-header {
                gap: 12px;
            }

            .header-left {
                gap: 10px;
            }

            .header-title {
                font-size: 17px;
            }

            .header-sub {
                font-size: 12px;
            }

            .btn-new {
                padding: 8px 14px;
                font-size: 12px;
                border-radius: 8px;
            }

            .basket-card {
                padding: 16px 14px 12px;
                border-radius: 14px;
            }

            .card-top {
                gap: 8px;
            }

            .card-name {
                font-size: 14px;
                max-width: 160px;
            }

            .perf-badge {
                font-size: 12px;
                padding: 3px 8px;
            }

            .stats-row {
                grid-template-columns: repeat(3, 1fr);
                gap: 6px;
            }

            .stat-box {
                padding: 7px 6px;
                border-radius: 8px;
            }

            .stat-label {
                font-size: 8px;
            }

            .stat-value {
                font-size: 12px;
            }

            .card-actions {
                gap: 6px;
                padding-top: 12px;
            }

            .btn-action {
                padding: 8px 6px;
                font-size: 11px;
                border-radius: 8px;
            }

            .btn-action svg {
                width: 12px;
                height: 12px;
            }

            .counter-badge {
                font-size: 11px;
                padding: 5px 10px;
            }

            .empty-state {
                padding: 40px 16px;
            }

            .empty-icon {
                width: 64px;
                height: 64px;
                border-radius: 20px;
            }

            .empty-icon svg {
                width: 28px;
                height: 28px;
            }

            .empty-title {
                font-size: 16px;
            }

            .empty-desc {
                font-size: 13px;
            }

            .toast {
                top: auto;
                bottom: 16px;
                left: 12px;
                right: 12px;
                max-width: none;
                text-align: center;
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 10px;
                transform: translateY(120%);
            }

            .toast.show {
                transform: translateY(0);
            }
        }

        @media (max-width: 360px) {
            .page {
                padding: 8px;
            }

            .header-title {
                font-size: 16px;
            }

            .card-name {
                font-size: 13px;
                max-width: 130px;
            }

            .stat-value {
                font-size: 11px;
            }

            .btn-action {
                font-size: 10px;
                padding: 7px 4px;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-wrapper::before {
                animation: none;
            }

            .particle {
                animation: none;
                display: none;
            }

            .basket-card {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .page-header {
                animation: none;
                opacity: 1;
            }

            .empty-state {
                animation: none;
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <div class="bg-wrapper">
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <div class="page">
        <!-- Header -->
        <header class="page-header">
            <div class="header-left">
                <div class="header-icon">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M5.52 2.64L3.6 6H2.4c-.66 0-1.2.54-1.2 1.2 0 .12.024.228.06.336L4.272 16.2c.204.588.756 1.008 1.404 1.008h12.648c.648 0 1.2-.42 1.404-1.008l3.012-8.664c.036-.108.06-.216.06-.336 0-.66-.54-1.2-1.2-1.2h-14.1L8.88 2.64H5.52zm.48 15.6c-1.32 0-2.388 1.08-2.388 2.4S4.68 23.04 6 23.04s2.4-1.08 2.4-2.4-1.08-2.4-2.4-2.4zm12 0c-1.32 0-2.388 1.08-2.388 2.4s1.068 2.4 2.388 2.4 2.4-1.08 2.4-2.4-1.08-2.4-2.4-2.4z" />
                    </svg>
                </div>
                <div>
                    <div class="header-title">Sepetlerim</div>
                    <div class="header-sub">Portföy sepetlerinizi yönetin</div>
                </div>
            </div>
            <div class="header-actions">
                <div class="counter-badge" id="counterBadge">
                    Sepet: <span class="num" id="counterNum">0 / 5</span>
                </div>
                <a class="btn-new" href="sepet.html">
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path d="M12 5v14M5 12h14" />
                    </svg>
                    <span>Yeni Sepet</span>
                </a>
            </div>
        </header>

        <!-- Basket list -->
        <div class="basket-grid" id="basketGrid"></div>

        <!-- Empty state -->
        <div class="empty-state" id="emptyState" style="display:none;">
            <div class="empty-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"
                    stroke-linejoin="round">
                    <circle cx="12" cy="12" r="10" />
                    <path d="M8 12h8" />
                </svg>
            </div>
            <div class="empty-title">Henüz oluşturulmuş bir sepet yok.</div>
            <div class="empty-desc">Yeni bir sepet oluşturarak başlayabilirsiniz.</div>
            <a class="btn-new" href="sepet.html">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 5v14M5 12h14" />
                </svg>
                <span>İlk Sepetini Oluştur</span>
            </a>
        </div>

        <!-- Nav -->
        <nav class="nav-bar">
            <a href="index.html">← Ana Sayfa</a>
        </nav>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Confirm dialog -->
    <div class="confirm-overlay" id="confirmOverlay">
        <div class="confirm-box">
            <div class="confirm-title" id="confirmTitle"></div>
            <div class="confirm-desc" id="confirmDesc"></div>
            <div class="confirm-actions">
                <button class="btn-cancel" id="confirmCancel">İptal</button>
                <button id="confirmOk"></button>
            </div>
        </div>
    </div>

    <!-- Reset modal -->
    <div class="confirm-overlay" id="resetOverlay">
        <div class="confirm-box" style="max-width:420px;">
            <div class="confirm-title" id="resetTitle">Sepeti Sıfırla</div>
            <div id="resetBody"></div>
            <div class="confirm-actions" id="resetActions" style="margin-top:16px;"></div>
        </div>
    </div>

    <!-- BasketStorage API -->
    <script src="basketStorage.js"></script>

    <script>
        (function () {
            'use strict';

            // ═══════════════════════════════════════════════════════
            // PERFORMANS HESAPLAMA FONKSİYONLARI
            // ═══════════════════════════════════════════════════════

            /**
             * calcBasketValue(basket) → number
             *
             * Sepetin güncel değerini hesaplar.
             *
             * Hareket modeli:
             *   güncel_değer = başlangıç_bakiyesi + CASH_IN - CASH_OUT + SELL - BUY
             *
             * Transaction objeleri basketStorage.js'deki formattadır:
             *   { type: 'BUY'|'SELL'|'CASH_IN'|'CASH_OUT', totalAmount: number }
             *   veya
             *   { type: 'BUY'|'SELL'|'CASH_IN'|'CASH_OUT', amount: number }
             *
             * ─── ÖRNEK SENARYOLAR ───
             *
             * Senaryo 1:
             *   başlangıç bakiyesi = 1000
             *   CASH_IN = 500, BUY = 200
             *   güncel değer = 1000 + 500 - 200 = 1300
             *   performans % = ((1300 - 1000) / 1000) * 100 = 30%
             *
             * Senaryo 2:
             *   başlangıç bakiyesi = 2000
             *   SELL = 500, CASH_OUT = 200
             *   güncel değer = 2000 + 500 - 200 = 2300
             *   performans % = ((2300 - 2000) / 2000) * 100 = 15%
             */
            function calcBasketValue(basket) {
                if (!basket) return 0;

                var value = typeof basket.initialBalance === 'number' ? basket.initialBalance : 0;
                var txs = Array.isArray(basket.transactions) ? basket.transactions : [];

                for (var i = 0; i < txs.length; i++) {
                    var tx = txs[i];
                    // Support both totalAmount (basketStorage.js format) and amount
                    var amt = typeof tx.totalAmount === 'number' ? tx.totalAmount
                        : typeof tx.amount === 'number' ? tx.amount : 0;

                    switch (tx.type) {
                        case 'CASH_IN':
                            value += amt;
                            break;
                        case 'CASH_OUT':
                            value -= amt;
                            break;
                        case 'SELL':
                            value += amt;
                            break;
                        case 'BUY':
                            value -= amt;
                            break;
                    }
                }

                return Math.round(value * 100) / 100;
            }

            /**
             * calcPerformance(basket) → number
             *
             * Sepetin yüzde performansını hesaplar.
             * performans % = ((güncel_değer - başlangıç_bakiyesi) / başlangıç_bakiyesi) * 100
             *
             * Edge-case: başlangıç bakiyesi 0 ise → 0 döner (divide-by-zero koruması)
             */
            function calcPerformance(basket) {
                if (!basket) return 0;
                var initial = typeof basket.initialBalance === 'number' ? basket.initialBalance : 0;

                // Divide-by-zero koruması
                if (initial === 0) return 0;

                var currentValue = calcBasketValue(basket);
                var pct = ((currentValue - initial) / initial) * 100;
                return Math.round(pct * 100) / 100;
            }

            // ═══════════════════════════════════════════════════════
            // UI HELPERS
            // ═══════════════════════════════════════════════════════

            var basketGrid = document.getElementById('basketGrid');
            var emptyState = document.getElementById('emptyState');
            var counterNum = document.getElementById('counterNum');
            var toastEl = document.getElementById('toast');
            var confirmOverlay = document.getElementById('confirmOverlay');
            var confirmTitle = document.getElementById('confirmTitle');
            var confirmDesc = document.getElementById('confirmDesc');
            var confirmCancel = document.getElementById('confirmCancel');
            var confirmOk = document.getElementById('confirmOk');

            var toastTimer = null;
            var pendingConfirm = null;

            function showToast(message, type) {
                clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.className = 'toast' + (type === 'success' ? ' success' : '');
                requestAnimationFrame(function () { toastEl.classList.add('show'); });
                toastTimer = setTimeout(function () { toastEl.classList.remove('show'); }, 3500);
            }

            function formatCurrency(value) {
                return new Intl.NumberFormat('tr-TR', {
                    style: 'currency',
                    currency: 'TRY',
                    minimumFractionDigits: 0,
                    maximumFractionDigits: 2
                }).format(value);
            }

            function formatDate(isoString) {
                if (!isoString) return '—';
                try {
                    var d = new Date(isoString);
                    return d.toLocaleDateString('tr-TR', {
                        day: '2-digit', month: '2-digit', year: 'numeric',
                        hour: '2-digit', minute: '2-digit'
                    });
                } catch (e) {
                    return '—';
                }
            }

            function escapeHtml(str) {
                var div = document.createElement('div');
                div.appendChild(document.createTextNode(str));
                return div.innerHTML;
            }

            // ═══════════════════════════════════════════════════════
            // CONFIRM DIALOG
            // ═══════════════════════════════════════════════════════

            function showConfirm(title, desc, btnText, btnClass, callback) {
                confirmTitle.textContent = title;
                confirmDesc.textContent = desc;
                confirmOk.textContent = btnText;
                confirmOk.className = btnClass;
                confirmOverlay.classList.add('active');
                pendingConfirm = callback;
            }

            function hideConfirm() {
                confirmOverlay.classList.remove('active');
                pendingConfirm = null;
            }

            confirmCancel.addEventListener('click', hideConfirm);
            confirmOverlay.addEventListener('click', function (e) {
                if (e.target === confirmOverlay) hideConfirm();
            });
            confirmOk.addEventListener('click', function () {
                if (typeof pendingConfirm === 'function') pendingConfirm();
                hideConfirm();
            });

            // ═══════════════════════════════════════════════════════
            // EVENT HOOKS (Aksiyon İşleyicileri)
            // ═══════════════════════════════════════════════════════

            /**
             * onDetailBasket(id)
             * Sepet detay sayfasına yönlendirir (ileride geliştirilecek).
             */
            function onDetailBasket(id) {
                var basket = window.BasketStorage.getBasketById(id);
                if (!basket) {
                    showToast('Sepet bulunamadı.', 'error');
                    return;
                }
                // Placeholder: ileride sepet detay sayfasına yönlendirilecek
                showToast('"' + basket.name + '" detay sayfası yakında eklenecek.', 'success');
            }

            /**
             * canReset(basket, now) → { allowed: boolean, daysLeft: number }
             * 30 gün dolmadan reset engellenir.
             */
            var RESET_COOLDOWN_DAYS = 30;

            function canReset(basket, nowDate) {
                if (!basket) return { allowed: false, daysLeft: 0 };
                if (!basket.lastResetAt) return { allowed: true, daysLeft: 0 };

                var lastReset = new Date(basket.lastResetAt);
                var now = nowDate || new Date();
                var diffMs = now.getTime() - lastReset.getTime();
                var diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
                var daysLeft = RESET_COOLDOWN_DAYS - diffDays;

                if (daysLeft <= 0) {
                    return { allowed: true, daysLeft: 0 };
                }
                return { allowed: false, daysLeft: daysLeft };
            }

            /**
             * resetBasketWithMode(basketId, mode) → Basket
             *   mode = "keep-current" → başlangıç bakiyesi güncel değere eşitlenir
             *   mode = "zero"         → başlangıç bakiyesi 0 yapılır
             */
            function resetBasketWithMode(basketId, mode) {
                var basket = window.BasketStorage.getBasketById(basketId);
                if (!basket) throw new Error('Sepet bulunamadı.');

                // Calculate current value before reset
                var currentValue = calcBasketValue(basket);

                // Use existing resetBasket to clear transactions
                window.BasketStorage.resetBasket(basketId);

                // Now adjust initialBalance based on mode
                var newInitial = 0;
                if (mode === 'keep-current') {
                    newInitial = currentValue;
                } else {
                    newInitial = 0;
                }

                // Update via storage API
                var updated = window.BasketStorage.getBasketById(basketId);
                if (updated) {
                    // Direct update through persistBaskets
                    var baskets = window.BasketStorage.listBaskets();
                    for (var i = 0; i < baskets.length; i++) {
                        if (baskets[i].id === basketId) {
                            baskets[i].initialBalance = newInitial;
                            baskets[i].currentBalance = newInitial;
                            break;
                        }
                    }
                    window.BasketStorage.persistBaskets(baskets);
                }

                return window.BasketStorage.getBasketById(basketId);
            }

            // Reset modal DOM
            var resetOverlay = document.getElementById('resetOverlay');
            var resetTitle = document.getElementById('resetTitle');
            var resetBody = document.getElementById('resetBody');
            var resetActions = document.getElementById('resetActions');

            function hideResetModal() {
                resetOverlay.classList.remove('active');
            }

            resetOverlay.addEventListener('click', function (e) {
                if (e.target === resetOverlay) hideResetModal();
            });

            /**
             * onResetBasket(id)
             * 30 gün kuralını kontrol eder, uygunsa mod seçim modalı gösterir.
             */
            function onResetBasket(id) {
                var basket = window.BasketStorage.getBasketById(id);
                if (!basket) {
                    showToast('Sepet bulunamadı.', 'error');
                    return;
                }

                // 30-day check
                var resetCheck = canReset(basket, new Date());
                if (!resetCheck.allowed) {
                    // Show warning
                    resetTitle.textContent = 'Sıfırlama Yapılamıyor';
                    resetBody.innerHTML = '<div class="reset-warning">'
                        + 'Bu sepeti tekrar resetlemek için <strong>' + resetCheck.daysLeft + ' gün</strong> daha beklemelisiniz.<br/>'
                        + '<span style="font-size:11px;color:var(--text-muted);margin-top:6px;display:inline-block;">'
                        + 'Son sıfırlama: ' + formatDate(basket.lastResetAt) + '</span>'
                        + '</div>';
                    resetActions.innerHTML = '<button class="btn-cancel" style="flex:1;">Tamam</button>';
                    resetActions.querySelector('.btn-cancel').addEventListener('click', hideResetModal);
                    resetOverlay.classList.add('active');
                    return;
                }

                // Show mode selection
                var currentValue = calcBasketValue(basket);
                resetTitle.textContent = '"' + basket.name + '" Sepetini Sıfırla';

                resetBody.innerHTML = '<div class="confirm-desc" style="margin-bottom:12px;text-align:center;">'
                    + 'Tüm işlemler silinecek. Başlangıç bakiyesini nasıl ayarlamak istersiniz?'
                    + '</div>'
                    + '<div class="reset-modal-body">'
                    + '<label class="reset-option selected" id="optKeep">'
                    + '<input type="radio" name="resetMode" value="keep-current" checked />'
                    + '<div class="reset-option-text">'
                    + '<div class="reset-option-title">Güncel değeri koru</div>'
                    + '<div class="reset-option-desc">Başlangıç bakiyesi güncel değere (' + formatCurrency(currentValue) + ') eşitlenir.</div>'
                    + '</div>'
                    + '</label>'
                    + '<label class="reset-option" id="optZero">'
                    + '<input type="radio" name="resetMode" value="zero" />'
                    + '<div class="reset-option-text">'
                    + '<div class="reset-option-title">Sıfırdan başla</div>'
                    + '<div class="reset-option-desc">Başlangıç bakiyesi 0 ₺ yapılır.</div>'
                    + '</div>'
                    + '</label>'
                    + '</div>';

                resetActions.innerHTML = '<button class="btn-cancel">İptal</button>'
                    + '<button class="btn-confirm-warn">Sıfırla</button>';

                // Radio toggle styling
                var optKeep = resetBody.querySelector('#optKeep');
                var optZero = resetBody.querySelector('#optZero');
                var radios = resetBody.querySelectorAll('input[name="resetMode"]');
                for (var r = 0; r < radios.length; r++) {
                    radios[r].addEventListener('change', function () {
                        optKeep.classList.toggle('selected', this.value === 'keep-current' && this.checked);
                        optZero.classList.toggle('selected', this.value === 'zero' && this.checked);
                    });
                }

                // Cancel
                resetActions.querySelector('.btn-cancel').addEventListener('click', hideResetModal);

                // Confirm
                resetActions.querySelector('.btn-confirm-warn').addEventListener('click', function () {
                    var selected = resetBody.querySelector('input[name="resetMode"]:checked');
                    var mode = selected ? selected.value : 'keep-current';
                    try {
                        resetBasketWithMode(id, mode);
                        showToast('"' + basket.name + '" sepeti sıfırlandı.', 'success');
                        hideResetModal();
                        renderBasketList();
                    } catch (err) {
                        showToast(err.message || 'Sıfırlama başarısız.', 'error');
                    }
                });

                resetOverlay.classList.add('active');
            }

            /**
             * onDeleteBasket(id)
             * Sepeti kalıcı olarak siler.
             */
            function onDeleteBasket(id) {
                var basket = window.BasketStorage.getBasketById(id);
                if (!basket) {
                    showToast('Sepet bulunamadı.', 'error');
                    return;
                }
                showConfirm(
                    'Sepeti Sil',
                    '"' + basket.name + '" sepeti kalıcı olarak silinecek. Bu işlem geri alınamaz.',
                    'Sil',
                    'btn-confirm-danger',
                    function () {
                        try {
                            var deleted = window.BasketStorage.deleteBasket(id);
                            if (deleted) {
                                showToast('"' + basket.name + '" sepeti silindi.', 'success');
                                renderBasketList();
                            }
                        } catch (err) {
                            showToast(err.message || 'Silme başarısız.', 'error');
                        }
                    }
                );
            }

            // ═══════════════════════════════════════════════════════
            // RENDER
            // ═══════════════════════════════════════════════════════

            /**
             * renderBasketList()
             * LocalStorage'dan sepetleri okur ve listeyi render eder.
             */
            function renderBasketList() {
                var baskets = window.BasketStorage.listBaskets();
                counterNum.textContent = baskets.length + ' / 5';

                if (!baskets.length) {
                    basketGrid.innerHTML = '';
                    emptyState.style.display = 'block';
                    return;
                }

                emptyState.style.display = 'none';

                var html = '';
                for (var i = 0; i < baskets.length; i++) {
                    var b = baskets[i];
                    var currentValue = calcBasketValue(b);
                    var perfPct = calcPerformance(b);
                    var perfSign = perfPct > 0 ? '+' : '';
                    var perfClass = perfPct > 0 ? 'positive' : perfPct < 0 ? 'negative' : 'neutral';
                    var perfArrow = perfPct > 0 ? '▲' : perfPct < 0 ? '▼' : '●';
                    var resetText = b.lastResetAt ? formatDate(b.lastResetAt) : 'Hiç sıfırlanmadı';

                    html += '<div class="basket-card" style="animation-delay:' + (i * 0.08) + 's" data-id="' + b.id + '">'

                        // Top row
                        + '<div class="card-top">'
                        + '<div class="card-name" title="' + escapeHtml(b.name) + '">' + escapeHtml(b.name) + '</div>'
                        + '<div class="perf-badge ' + perfClass + '">'
                        + '<span class="arrow">' + perfArrow + '</span>'
                        + perfSign + perfPct.toFixed(2) + '%'
                        + '</div>'
                        + '</div>'

                        // Stats row
                        + '<div class="stats-row">'
                        + '<div class="stat-box">'
                        + '<div class="stat-label">Başlangıç</div>'
                        + '<div class="stat-value">' + formatCurrency(b.initialBalance) + '</div>'
                        + '</div>'
                        + '<div class="stat-box">'
                        + '<div class="stat-label">Güncel Değer</div>'
                        + '<div class="stat-value gold">' + formatCurrency(currentValue) + '</div>'
                        + '</div>'
                        + '<div class="stat-box">'
                        + '<div class="stat-label">Performans</div>'
                        + '<div class="stat-value ' + (perfPct >= 0 ? '' : 'negative') + '">'
                        + perfSign + perfPct.toFixed(2) + '%'
                        + '</div>'
                        + '</div>'
                        + '</div>'

                        // Meta
                        + '<div class="card-meta">'
                        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
                        + '<circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/>'
                        + '</svg>'
                        + 'Son sıfırlama: ' + resetText
                        + '</div>'

                        // Actions
                        + '<div class="card-actions">'
                        + '<button class="btn-action btn-detail" data-action="detail" data-id="' + b.id + '">'
                        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
                        + '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>'
                        + '</svg>'
                        + 'Detay'
                        + '</button>'
                        + '<button class="btn-action btn-reset" data-action="reset" data-id="' + b.id + '">'
                        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
                        + '<polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/>'
                        + '</svg>'
                        + 'Sıfırla'
                        + '</button>'
                        + '<button class="btn-action btn-delete-action" data-action="delete" data-id="' + b.id + '">'
                        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">'
                        + '<polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/>'
                        + '<path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/>'
                        + '</svg>'
                        + 'Sil'
                        + '</button>'
                        + '</div>'

                        + '</div>';
                }

                basketGrid.innerHTML = html;

                // Attach event handlers
                var actionBtns = basketGrid.querySelectorAll('.btn-action');
                for (var j = 0; j < actionBtns.length; j++) {
                    actionBtns[j].addEventListener('click', handleAction);
                }
            }

            function handleAction(e) {
                var btn = e.currentTarget;
                var action = btn.getAttribute('data-action');
                var id = btn.getAttribute('data-id');
                if (!id || !action) return;

                switch (action) {
                    case 'detail': onDetailBasket(id); break;
                    case 'reset': onResetBasket(id); break;
                    case 'delete': onDeleteBasket(id); break;
                }
            }

            // ═══════════════════════════════════════════════════════
            // INIT
            // ═══════════════════════════════════════════════════════
            renderBasketList();
        })();
    </script>

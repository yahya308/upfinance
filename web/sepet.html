<!doctype html>
<html lang="tr">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>UpFinance — Sepet Oluştur</title>
    <meta name="description" content="UpFinance sepet oluşturma sayfası. BIST hisse sepetinizi oluşturun ve yönetin." />
    <link rel="icon" href="data:," />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
        rel="stylesheet" />
    <style>
        :root {
            --gold: #D4AF37;
            --gold-light: #F0D060;
            --gold-dark: #B8960C;
            --navy: #1B1F3B;
            --navy-deep: #0F1225;
            --navy-light: #252A4A;
            --navy-surface: #1E2340;
            --text-primary: #F5F5F5;
            --text-muted: #A0A4B8;
            --error: #FF6B6B;
            --success: #4ADE80;
            --border: rgba(212, 175, 55, 0.15);
            --glow: rgba(212, 175, 55, 0.25);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--navy-deep);
            color: var(--text-primary);
            overflow-x: hidden;
        }

        /* Animated background */
        .bg-wrapper {
            position: fixed;
            inset: 0;
            z-index: 0;
            background: linear-gradient(135deg, #0F1225 0%, #1B1F3B 40%, #151933 60%, #0F1225 100%);
            overflow: hidden;
        }

        .bg-wrapper::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(ellipse at 30% 20%, rgba(212, 175, 55, 0.06) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(212, 175, 55, 0.04) 0%, transparent 50%);
            animation: bgShift 15s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% {
                transform: translate(0, 0) rotate(0deg);
            }

            100% {
                transform: translate(30px, -20px) rotate(2deg);
            }
        }

        /* Floating particles */
        .particles {
            position: absolute;
            inset: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: var(--gold);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s ease-in-out infinite;
        }

        .particle:nth-child(1) {
            left: 15%;
            top: 20%;
            animation-delay: 0s;
            animation-duration: 10s;
        }

        .particle:nth-child(2) {
            left: 70%;
            top: 30%;
            animation-delay: 2s;
            animation-duration: 12s;
        }

        .particle:nth-child(3) {
            left: 40%;
            top: 70%;
            animation-delay: 4s;
            animation-duration: 9s;
        }

        .particle:nth-child(4) {
            left: 85%;
            top: 60%;
            animation-delay: 1s;
            animation-duration: 11s;
        }

        .particle:nth-child(5) {
            left: 25%;
            top: 85%;
            animation-delay: 3s;
            animation-duration: 8s;
        }

        .particle:nth-child(6) {
            left: 55%;
            top: 15%;
            animation-delay: 5s;
            animation-duration: 13s;
        }

        @keyframes float {

            0%,
            100% {
                opacity: 0;
                transform: translateY(0) scale(1);
            }

            25% {
                opacity: 0.6;
            }

            50% {
                opacity: 0.3;
                transform: translateY(-60px) scale(1.5);
            }

            75% {
                opacity: 0.5;
            }
        }

        /* Page layout */
        .page {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            gap: 24px;
        }

        /* Card */
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(30, 35, 64, 0.75);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 44px 40px 36px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.35),
                0 0 0 1px rgba(212, 175, 55, 0.05) inset;
            animation: cardEnter 0.7s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(20px);
        }

        @keyframes cardEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Brand */
        .brand {
            text-align: center;
            margin-bottom: 32px;
        }

        .brand-icon {
            width: 56px;
            height: 56px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            border-radius: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 16px;
            box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            animation: iconPulse 3s ease-in-out infinite;
        }

        @keyframes iconPulse {

            0%,
            100% {
                box-shadow: 0 4px 20px rgba(212, 175, 55, 0.3);
            }

            50% {
                box-shadow: 0 4px 30px rgba(212, 175, 55, 0.5);
            }
        }

        .brand-icon svg {
            width: 28px;
            height: 28px;
            fill: var(--navy-deep);
        }

        .brand h1 {
            font-size: 26px;
            font-weight: 700;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 50%, var(--gold-dark) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .brand p {
            color: var(--text-muted);
            font-size: 14px;
            margin-top: 6px;
            font-weight: 400;
        }

        /* Form fields */
        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 13px;
            font-weight: 500;
            color: var(--text-muted);
            margin-bottom: 8px;
            letter-spacing: 0.3px;
        }

        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            width: 18px;
            height: 18px;
            color: var(--text-muted);
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .form-input {
            width: 100%;
            background: rgba(15, 18, 37, 0.6);
            border: 1px solid rgba(212, 175, 55, 0.12);
            color: var(--text-primary);
            border-radius: 12px;
            padding: 14px 14px 14px 44px;
            font-size: 14px;
            font-family: inherit;
            outline: none;
            transition: all 0.3s ease;
        }

        .form-input::placeholder {
            color: rgba(160, 164, 184, 0.5);
        }

        .form-input:hover {
            border-color: rgba(212, 175, 55, 0.25);
        }

        .form-input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1),
                0 0 20px rgba(212, 175, 55, 0.05);
        }

        .form-input:focus~.input-icon,
        .form-input:focus+.input-icon {
            color: var(--gold);
        }

        .form-input.error {
            border-color: var(--error);
            box-shadow: 0 0 0 3px rgba(255, 107, 107, 0.1);
        }

        .form-input.success {
            border-color: var(--success);
        }

        .input-hint {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 6px;
            padding-left: 2px;
            opacity: 0.7;
        }

        .error-message {
            display: none;
            color: var(--error);
            font-size: 12px;
            margin-top: 6px;
            padding-left: 2px;
            animation: errorSlide 0.3s ease;
        }

        .error-message.visible {
            display: block;
        }

        @keyframes errorSlide {
            from {
                opacity: 0;
                transform: translateY(-4px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Submit button */
        .btn-submit {
            width: 100%;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-dark) 100%);
            color: var(--navy-deep);
            border: none;
            border-radius: 12px;
            padding: 15px 24px;
            font-size: 15px;
            font-weight: 700;
            font-family: inherit;
            cursor: pointer;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
            margin-top: 8px;
        }

        .btn-submit::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 100%);
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 24px rgba(212, 175, 55, 0.35);
        }

        .btn-submit:hover::before {
            opacity: 1;
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        .btn-submit span {
            position: relative;
            z-index: 1;
        }

        .btn-submit:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        .btn-submit:disabled::before {
            opacity: 0;
        }

        /* Divider */
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0 20px;
        }

        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(212, 175, 55, 0.15), transparent);
        }

        .divider span {
            color: var(--text-muted);
            font-size: 12px;
            font-weight: 500;
            white-space: nowrap;
        }

        /* Basket list */
        .basket-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .basket-item {
            background: rgba(15, 18, 37, 0.5);
            border: 1px solid rgba(212, 175, 55, 0.08);
            border-radius: 12px;
            padding: 14px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            transition: all 0.3s ease;
            animation: itemEnter 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;
            opacity: 0;
            transform: translateY(8px);
        }

        @keyframes itemEnter {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .basket-item:hover {
            border-color: rgba(212, 175, 55, 0.2);
            background: rgba(15, 18, 37, 0.7);
        }

        .basket-info {
            flex: 1;
            min-width: 0;
        }

        .basket-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .basket-meta {
            font-size: 11px;
            color: var(--text-muted);
            margin-top: 3px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .basket-balance {
            color: var(--gold);
            font-weight: 600;
            font-size: 13px;
            white-space: nowrap;
        }

        .btn-delete {
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.15);
            color: var(--error);
            width: 34px;
            height: 34px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .btn-delete:hover {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.35);
            transform: scale(1.05);
        }

        .btn-delete svg {
            width: 16px;
            height: 16px;
        }

        .empty-state {
            text-align: center;
            padding: 20px 10px;
            color: var(--text-muted);
            font-size: 13px;
        }

        .empty-state svg {
            width: 40px;
            height: 40px;
            color: rgba(212, 175, 55, 0.2);
            margin-bottom: 10px;
        }

        /* Counter badge */
        .counter {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .counter-num {
            background: rgba(212, 175, 55, 0.12);
            color: var(--gold);
            font-weight: 700;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 6px;
        }

        /* Nav link */
        .nav-link {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: var(--text-muted);
        }

        .nav-link a {
            color: var(--gold);
            text-decoration: none;
            font-weight: 600;
            transition: all 0.2s ease;
            position: relative;
        }

        .nav-link a::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1.5px;
            background: var(--gold);
            transition: width 0.3s ease;
        }

        .nav-link a:hover::after {
            width: 100%;
        }

        .nav-link a:hover {
            color: var(--gold-light);
        }

        /* Toast notification */
        .toast {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
            background: rgba(30, 35, 64, 0.95);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            padding: 14px 20px;
            color: var(--error);
            font-size: 13px;
            font-weight: 500;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transform: translateX(120%);
            transition: transform 0.4s cubic-bezier(0.22, 1, 0.36, 1);
            max-width: min(360px, calc(100vw - 24px));
        }

        .toast.success {
            border-color: rgba(74, 222, 128, 0.3);
            color: var(--success);
        }

        .toast.show {
            transform: translateX(0);
        }

        /* ═══ Responsive ═══ */

        @media (max-width: 600px) {
            .page {
                padding: 16px;
                padding-top: env(safe-area-inset-top, 16px);
                padding-bottom: env(safe-area-inset-bottom, 16px);
            }

            .card {
                padding: 36px 28px 30px;
                border-radius: 20px;
            }
        }

        @media (max-width: 480px) {
            .page {
                padding: 12px;
            }

            .card {
                padding: 32px 20px 26px;
                border-radius: 18px;
                box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            }

            .brand {
                margin-bottom: 24px;
            }

            .brand-icon {
                width: 48px;
                height: 48px;
                border-radius: 14px;
                margin-bottom: 12px;
            }

            .brand-icon svg {
                width: 24px;
                height: 24px;
            }

            .brand h1 {
                font-size: 22px;
            }

            .brand p {
                font-size: 13px;
            }

            .form-label {
                font-size: 12px;
                margin-bottom: 6px;
            }

            .form-input {
                font-size: 16px;
                padding: 13px 13px 13px 40px;
                border-radius: 10px;
            }

            .input-icon {
                left: 12px;
                width: 16px;
                height: 16px;
            }

            .btn-submit {
                padding: 14px 20px;
                font-size: 15px;
                border-radius: 10px;
            }

            .divider {
                margin: 22px 0 16px;
            }

            .error-message {
                font-size: 11px;
            }

            .basket-item {
                padding: 12px 14px;
                border-radius: 10px;
            }

            .basket-name {
                font-size: 13px;
            }

            .basket-balance {
                font-size: 12px;
            }

            .toast {
                top: auto;
                bottom: 16px;
                left: 12px;
                right: 12px;
                max-width: none;
                text-align: center;
                font-size: 13px;
                padding: 12px 16px;
                border-radius: 10px;
                transform: translateY(120%);
            }

            .toast.show {
                transform: translateY(0);
            }
        }

        @media (max-width: 360px) {
            .page {
                padding: 8px;
            }

            .card {
                padding: 24px 16px 22px;
                border-radius: 16px;
            }

            .brand-icon {
                width: 44px;
                height: 44px;
            }

            .brand h1 {
                font-size: 20px;
            }

            .form-input {
                padding: 12px 12px 12px 38px;
            }

            .btn-submit {
                padding: 13px 16px;
                font-size: 14px;
            }
        }

        @media (max-width: 320px) {
            .page {
                padding: 6px;
            }

            .card {
                padding: 20px 12px 18px;
                border-radius: 14px;
            }

            .brand {
                margin-bottom: 20px;
            }

            .brand-icon {
                width: 40px;
                height: 40px;
                border-radius: 12px;
            }

            .brand-icon svg {
                width: 20px;
                height: 20px;
            }

            .brand h1 {
                font-size: 18px;
            }

            .brand p {
                font-size: 12px;
            }

            .form-label {
                font-size: 11px;
            }

            .form-input {
                padding: 11px 11px 11px 36px;
                font-size: 16px;
            }

            .btn-submit {
                padding: 12px 14px;
                font-size: 13px;
            }
        }

        @media (max-height: 500px) and (orientation: landscape) {
            .page {
                align-items: flex-start;
                padding: 12px;
            }

            .card {
                margin-top: 8px;
                margin-bottom: 8px;
            }

            .brand {
                margin-bottom: 14px;
            }

            .brand-icon {
                width: 40px;
                height: 40px;
                margin-bottom: 8px;
            }

            .brand-icon svg {
                width: 20px;
                height: 20px;
            }

            .brand h1 {
                font-size: 20px;
            }

            .brand p {
                font-size: 12px;
                margin-top: 2px;
            }

            .form-group {
                margin-bottom: 12px;
            }

            .form-input {
                padding-top: 10px;
                padding-bottom: 10px;
            }

            .btn-submit {
                padding: 12px 20px;
                margin-top: 4px;
            }

            .divider {
                margin: 12px 0 10px;
            }
        }

        /* Transparent basket background */
        .bg-baskets {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 80px 24px 24px;
            gap: 14px;
            overflow: hidden;
            opacity: 0.12;
            filter: blur(1px);
        }

        .bg-basket-card {
            width: 100%;
            max-width: 520px;
            background: rgba(30, 35, 64, 0.9);
            border: 1px solid rgba(212, 175, 55, 0.12);
            border-radius: 18px;
            padding: 18px 20px;
        }

        .bg-card-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 12px;
        }

        .bg-card-name {
            font-size: 15px;
            font-weight: 700;
            color: var(--text-primary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .bg-perf {
            font-size: 13px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 8px;
            white-space: nowrap;
        }

        .bg-perf.positive {
            background: rgba(74, 222, 128, 0.12);
            color: var(--success);
        }

        .bg-perf.negative {
            background: rgba(255, 107, 107, 0.12);
            color: var(--error);
        }

        .bg-perf.neutral {
            background: rgba(160, 164, 184, 0.12);
            color: var(--text-muted);
        }

        .bg-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 8px;
        }

        .bg-stat {
            background: rgba(15, 18, 37, 0.45);
            border: 1px solid rgba(212, 175, 55, 0.06);
            border-radius: 8px;
            padding: 8px 10px;
            text-align: center;
        }

        .bg-stat-label {
            font-size: 9px;
            font-weight: 500;
            color: var(--text-muted);
            text-transform: uppercase;
            margin-bottom: 3px;
        }

        .bg-stat-value {
            font-size: 12px;
            font-weight: 700;
            color: var(--text-primary);
        }

        @media (prefers-reduced-motion: reduce) {
            .bg-wrapper::before {
                animation: none;
            }

            .particle {
                animation: none;
                display: none;
            }

            .brand-icon {
                animation: none;
            }

            .card {
                animation: none;
                opacity: 1;
                transform: none;
            }

            .basket-item {
                animation: none;
                opacity: 1;
                transform: none;
            }
        }
    </style>
</head>

<body>
    <div class="bg-wrapper">
        <div class="particles">
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
            <div class="particle"></div>
        </div>
    </div>

    <!-- Transparent basket background -->
    <div class="bg-baskets" id="bgBaskets"></div>

    <div class="page">
        <!-- ─── Create Basket Card ─── -->
        <div class="card" id="createCard">
            <div class="brand">
                <div class="brand-icon">
                    <!-- Shopping basket SVG icon -->
                    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M5.52 2.64L3.6 6H2.4c-.66 0-1.2.54-1.2 1.2 0 .12.024.228.06.336L4.272 16.2c.204.588.756 1.008 1.404 1.008h12.648c.648 0 1.2-.42 1.404-1.008l3.012-8.664c.036-.108.06-.216.06-.336 0-.66-.54-1.2-1.2-1.2h-14.1L8.88 2.64H5.52zm.48 15.6c-1.32 0-2.388 1.08-2.388 2.4S4.68 23.04 6 23.04s2.4-1.08 2.4-2.4-1.08-2.4-2.4-2.4zm12 0c-1.32 0-2.388 1.08-2.388 2.4s1.068 2.4 2.388 2.4 2.4-1.08 2.4-2.4-1.08-2.4-2.4-2.4z" />
                    </svg>
                </div>
                <h1>Yeni Sepet Oluştur</h1>
                <p>Hisse senedi sepetinizi oluşturun ve portföyünüzü yönetin</p>
            </div>

            <form id="basketForm" novalidate autocomplete="off">
                <!-- Sepet Adı -->
                <div class="form-group">
                    <label class="form-label" for="basketName">Sepet Adı</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="text" id="basketName"
                            placeholder="Örn: Banka Hisseleri, Büyüme Portföyü" maxlength="40" required />
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 20h4L18.5 9.5a2.121 2.121 0 00-3-3L5 17v3z" />
                            <path d="M13.5 6.5l3 3" />
                        </svg>
                    </div>
                    <div class="error-message" id="nameError"></div>
                </div>

                <!-- Başlangıç Bakiyesi -->
                <div class="form-group">
                    <label class="form-label" for="basketBalance">Başlangıç Bakiyesi (₺)</label>
                    <div class="input-wrapper">
                        <input class="form-input" type="text" inputmode="decimal" id="basketBalance"
                            placeholder="Örn: 10.000" autocomplete="off" required />
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <line x1="12" y1="1" x2="12" y2="23" />
                            <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6" />
                        </svg>
                    </div>
                    <div class="input-hint">0 ile 1.000.000 ₺ arasında bir değer girin</div>
                    <div class="error-message" id="balanceError"></div>
                </div>

                <!-- Submit -->
                <button type="submit" class="btn-submit" id="submitBtn">
                    <span>Sepet Oluştur</span>
                </button>
            </form>

            <!-- Global error -->
            <div class="error-message" id="globalError" style="margin-top:14px; text-align:center;"></div>

            <!-- Nav link -->
            <div class="nav-link">
                <a href="sepetlerim.html">← Sepetlerime Dön</a>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- BasketStorage API -->
    <script src="basketStorage.js"></script>

    <script>
        // Render transparent basket cards in background
        (function () {
            'use strict';
            var bgContainer = document.getElementById('bgBaskets');
            if (!bgContainer || !window.BasketStorage) return;

            var baskets = window.BasketStorage.listBaskets();
            if (!baskets.length) return;

            function formatCurrency(value) {
                return new Intl.NumberFormat('tr-TR', {
                    style: 'currency', currency: 'TRY',
                    minimumFractionDigits: 0, maximumFractionDigits: 2
                }).format(value);
            }

            function calcValue(b) {
                var v = typeof b.initialBalance === 'number' ? b.initialBalance : 0;
                var txs = Array.isArray(b.transactions) ? b.transactions : [];
                for (var i = 0; i < txs.length; i++) {
                    var tx = txs[i];
                    var amt = typeof tx.totalAmount === 'number' ? tx.totalAmount
                        : typeof tx.amount === 'number' ? tx.amount : 0;
                    switch (tx.type) {
                        case 'CASH_IN': v += amt; break;
                        case 'CASH_OUT': v -= amt; break;
                        case 'SELL': v += amt; break;
                        case 'BUY': v -= amt; break;
                    }
                }
                return Math.round(v * 100) / 100;
            }

            function escHtml(s) {
                var d = document.createElement('div');
                d.appendChild(document.createTextNode(s));
                return d.innerHTML;
            }

            var html = '';
            for (var i = 0; i < baskets.length; i++) {
                var b = baskets[i];
                var cv = calcValue(b);
                var init = typeof b.initialBalance === 'number' ? b.initialBalance : 0;
                var pct = init > 0 ? Math.round(((cv - init) / init) * 10000) / 100 : 0;
                var sign = pct > 0 ? '+' : '';
                var cls = pct > 0 ? 'positive' : pct < 0 ? 'negative' : 'neutral';

                html += '<div class="bg-basket-card">'
                    + '<div class="bg-card-top">'
                    + '<div class="bg-card-name">' + escHtml(b.name) + '</div>'
                    + '<div class="bg-perf ' + cls + '">' + sign + pct.toFixed(2) + '%</div>'
                    + '</div>'
                    + '<div class="bg-stats">'
                    + '<div class="bg-stat"><div class="bg-stat-label">Başlangıç</div><div class="bg-stat-value">' + formatCurrency(init) + '</div></div>'
                    + '<div class="bg-stat"><div class="bg-stat-label">Güncel</div><div class="bg-stat-value" style="color:var(--gold)">' + formatCurrency(cv) + '</div></div>'
                    + '<div class="bg-stat"><div class="bg-stat-label">Performans</div><div class="bg-stat-value">' + sign + pct.toFixed(2) + '%</div></div>'
                    + '</div>'
                    + '</div>';
            }
            bgContainer.innerHTML = html;
        })();
    </script>

    <script>
        (function () {
            'use strict';

            // ── DOM refs ──
            var form = document.getElementById('basketForm');
            var nameInput = document.getElementById('basketName');
            var balanceInput = document.getElementById('basketBalance');
            var nameError = document.getElementById('nameError');
            var balanceError = document.getElementById('balanceError');
            var globalError = document.getElementById('globalError');
            var submitBtn = document.getElementById('submitBtn');
            var basketList = document.getElementById('basketList');
            var emptyState = document.getElementById('emptyState');
            var basketCountNum = document.getElementById('basketCountNum');
            var toastEl = document.getElementById('toast');

            var toastTimer = null;

            // ── Toast ──
            function showToast(message, type) {
                clearTimeout(toastTimer);
                toastEl.textContent = message;
                toastEl.className = 'toast' + (type === 'success' ? ' success' : '');
                requestAnimationFrame(function () {
                    toastEl.classList.add('show');
                });
                toastTimer = setTimeout(function () {
                    toastEl.classList.remove('show');
                }, 3500);
            }

            // ── Error helpers ──
            function showFieldError(inputEl, errorEl, message) {
                inputEl.classList.add('error');
                inputEl.classList.remove('success');
                errorEl.textContent = message;
                errorEl.classList.add('visible');
            }

            function clearFieldError(inputEl, errorEl) {
                inputEl.classList.remove('error');
                errorEl.textContent = '';
                errorEl.classList.remove('visible');
            }

            function clearAllErrors() {
                clearFieldError(nameInput, nameError);
                clearFieldError(balanceInput, balanceError);
                globalError.textContent = '';
                globalError.classList.remove('visible');
            }

            // ── Money Helpers ──
            // Edge-cases handled:
            //   boş input → NaN          sadece boşluk → NaN
            //   harf girişi → NaN        nokta/virgül karışık → parsed
            //   negatif sayı → parsed    0 → valid (0)
            //   1.000.000 → valid        >1.000.000 → parsed, validation catches
            //   çok büyük sayı → parsed  NaN → NaN
            //   baş/son boşluk → trimmed

            /**
             * parseMoney(str) → number | NaN
             * Türkçe formatlı para stringini sayıya çevirir.
             * "1.000.000" → 1000000
             * "50.000,75" → 50000.75
             * "10000"     → 10000
             * "abc"       → NaN
             */
            function parseMoney(str) {
                if (typeof str !== 'string') return NaN;
                var s = str.trim();
                if (s === '') return NaN;

                // Remove all whitespace and non-breaking spaces
                s = s.replace(/[\s\u00A0]/g, '');

                // Remove ₺ and TL suffixes/prefixes
                s = s.replace(/₺/g, '').replace(/TL/gi, '').trim();

                if (s === '') return NaN;

                // Determine format: if both . and , exist, last one is decimal
                var lastDot = s.lastIndexOf('.');
                var lastComma = s.lastIndexOf(',');

                if (lastComma > lastDot) {
                    // Turkish style: 1.000,50 → comma is decimal
                    s = s.replace(/\./g, '');   // remove thousand dots
                    s = s.replace(',', '.');    // comma → decimal dot
                } else if (lastDot > lastComma) {
                    // Could be: 1,000.50 (English) or 1.000 (Turkish thousand)
                    // Heuristic: if dot has exactly 3 digits after and no other dots → thousand sep
                    var afterDot = s.substring(lastDot + 1);
                    var dotCount = (s.match(/\./g) || []).length;
                    if (dotCount >= 2) {
                        // Multiple dots: 1.000.000 → thousand separators
                        s = s.replace(/\./g, '');
                        s = s.replace(/,/g, '');
                    } else if (afterDot.length === 3 && /^\d{3}$/.test(afterDot) && lastComma === -1) {
                        // Single dot with 3 digits after: 50.000 → thousand sep
                        s = s.replace(/\./g, '');
                    } else {
                        // Single dot with ≠ 3 digits: 100.5 → decimal
                        s = s.replace(/,/g, '');
                    }
                } else {
                    // No dot or comma, or only one type
                    s = s.replace(/,/g, '.');
                }

                // Only digits, optional minus, optional one decimal point
                if (!/^-?\d+(\.\d+)?$/.test(s)) return NaN;

                var num = parseFloat(s);
                if (!isFinite(num)) return NaN;
                return num;
            }

            /**
             * formatMoney(num) → string
             * Sayıyı Türkçe okunabilir TL formatına çevirir.
             * 1000000  → "1.000.000"
             * 50000.75 → "50.000,75"
             * 0        → "0"
             */
            function formatMoney(num) {
                if (typeof num !== 'number' || !isFinite(num)) return '';
                // Round to 2 decimal places
                var rounded = Math.round(num * 100) / 100;
                var parts = rounded.toFixed(2).split('.');
                var intPart = parts[0];
                var decPart = parts[1];

                // Handle negative
                var sign = '';
                if (intPart.charAt(0) === '-') {
                    sign = '-';
                    intPart = intPart.substring(1);
                }

                // Add thousand separators (dots)
                var formatted = '';
                for (var i = intPart.length - 1, c = 0; i >= 0; i--, c++) {
                    if (c > 0 && c % 3 === 0) formatted = '.' + formatted;
                    formatted = intPart.charAt(i) + formatted;
                }

                // Append decimals only if non-zero
                if (decPart !== '00') {
                    return sign + formatted + ',' + decPart;
                }
                return sign + formatted;
            }

            /**
             * validateBalanceInput(rawStr) → { valid: boolean, value: number, error: string }
             * Tüm edge-case'leri merkezi olarak ele alır.
             */
            function validateBalanceInput(rawStr) {
                var trimmed = (rawStr || '').trim();

                // Boş input
                if (!trimmed) {
                    return { valid: false, value: NaN, error: 'Bakiye boş olamaz.' };
                }

                // Sadece boşluk / özel karakter
                if (/^[\s.,₺]+$/.test(trimmed)) {
                    return { valid: false, value: NaN, error: 'Geçerli bir sayı girin.' };
                }

                var num = parseMoney(trimmed);

                // NaN — harf, anlamsız karakter
                if (isNaN(num)) {
                    return { valid: false, value: NaN, error: 'Geçerli bir sayı girin. Örn: 10.000 veya 50000' };
                }

                // Negatif
                if (num < 0) {
                    return { valid: false, value: num, error: 'Bakiye 0\'dan küçük olamaz.' };
                }

                // Üst sınır
                if (num > 1000000) {
                    return { valid: false, value: num, error: 'Bakiye en fazla 1.000.000 ₺ olabilir.' };
                }

                return { valid: true, value: num, error: '' };
            }

            // ── Validation ──
            function validateForm() {
                var valid = true;
                clearAllErrors();

                var name = nameInput.value.trim();
                if (!name) {
                    showFieldError(nameInput, nameError, 'Sepet adı boş olamaz.');
                    valid = false;
                } else if (name.length > 40) {
                    showFieldError(nameInput, nameError, 'Sepet adı en fazla 40 karakter olabilir.');
                    valid = false;
                }

                var balResult = validateBalanceInput(balanceInput.value);
                if (!balResult.valid) {
                    showFieldError(balanceInput, balanceError, balResult.error);
                    valid = false;
                }

                // Max basket check
                var baskets = window.BasketStorage.listBaskets();
                if (baskets.length >= 5) {
                    globalError.textContent = 'En fazla 5 sepet oluşturabilirsiniz.';
                    globalError.classList.add('visible');
                    valid = false;
                }

                return valid;
            }

            // ── Max basket check on load ──
            function checkMaxBaskets() {
                var baskets = window.BasketStorage.listBaskets();
                if (baskets.length >= 5) {
                    submitBtn.disabled = true;
                    globalError.textContent = 'En fazla 5 sepet oluşturabilirsiniz.';
                    globalError.classList.add('visible');
                }
            }

            // ── Form submit ──
            form.addEventListener('submit', function (e) {
                e.preventDefault();

                if (!validateForm()) return;

                var name = nameInput.value.trim();
                var balance = parseMoney(balanceInput.value);

                try {
                    var newBasket = window.BasketStorage.createBasket(name, balance);

                    // Success
                    showToast('"' + newBasket.name + '" sepeti başarıyla oluşturuldu!', 'success');

                    // Reset form
                    nameInput.value = '';
                    balanceInput.value = '';
                    clearAllErrors();

                    // Redirect to basket list after short delay
                    setTimeout(function () { window.location.href = 'sepetlerim.html'; }, 1500);
                } catch (err) {
                    var msg = err.message || 'Sepet oluşturulamadı.';

                    // Route specific errors to fields
                    if (msg.toLowerCase().indexOf('sepet adı') !== -1 || msg.toLowerCase().indexOf('isimde') !== -1) {
                        showFieldError(nameInput, nameError, msg);
                    } else if (msg.toLowerCase().indexOf('bakiye') !== -1) {
                        showFieldError(balanceInput, balanceError, msg);
                    } else if (msg.toLowerCase().indexOf('maksimum') !== -1 || msg.toLowerCase().indexOf('fazla') !== -1) {
                        globalError.textContent = 'En fazla 5 sepet oluşturabilirsiniz.';
                        globalError.classList.add('visible');
                    } else {
                        globalError.textContent = msg;
                        globalError.classList.add('visible');
                    }

                    showToast(msg, 'error');
                }
            });

            // ── Real-time validation on blur ──
            nameInput.addEventListener('blur', function () {
                if (nameInput.value.trim()) {
                    clearFieldError(nameInput, nameError);
                }
            });

            // ── Live money formatting ──
            // On blur: format the value to readable TL
            balanceInput.addEventListener('blur', function () {
                var raw = balanceInput.value;
                var result = validateBalanceInput(raw);
                if (result.valid) {
                    // Replace input value with formatted display
                    balanceInput.value = formatMoney(result.value);
                    clearFieldError(balanceInput, balanceError);
                } else if (raw.trim()) {
                    // Show error but don't clear their input
                    showFieldError(balanceInput, balanceError, result.error);
                }
            });

            // On focus: show raw number for easy editing
            balanceInput.addEventListener('focus', function () {
                var raw = balanceInput.value;
                var num = parseMoney(raw);
                if (!isNaN(num) && isFinite(num)) {
                    // Show plain number without thousand separators
                    var plain = num % 1 === 0 ? String(num) : num.toFixed(2);
                    balanceInput.value = plain;
                }
                // Select all for easy overwrite
                setTimeout(function () { balanceInput.select(); }, 0);
            });

            // On input: strip non-numeric chars except comma, dot, minus
            balanceInput.addEventListener('input', function () {
                var val = balanceInput.value;
                // Allow: digits, dot, comma, minus (at start only)
                var cleaned = val.replace(/[^\d.,-]/g, '');
                if (cleaned !== val) {
                    balanceInput.value = cleaned;
                }
                // Clear error while actively typing
                if (cleaned.trim()) {
                    clearFieldError(balanceInput, balanceError);
                }
            });

            // ── Init ──
            checkMaxBaskets();
        })();
    </script>
